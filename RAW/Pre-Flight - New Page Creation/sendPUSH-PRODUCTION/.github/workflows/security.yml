name: Security

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  guard-actions-runtime:
    name: Guard deprecated action runtimes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check workflow action versions
        run: bash ./scripts/check-github-actions-runtime.sh

  gitleaks:
    name: gitleaks secret scan
    runs-on: ubuntu-latest
    needs: guard-actions-runtime
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz
          install -m 0755 gitleaks /usr/local/bin/gitleaks

      - name: Run gitleaks
        run: gitleaks git --config .gitleaks.toml --redact --exit-code 1 .

  env-taxonomy-check:
    name: Client-bundle env taxonomy
    runs-on: ubuntu-latest
    needs: guard-actions-runtime
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Grep for server-only env usage in client code
        run: |
          set -eu
          if grep -REn \
            --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx' \
            'process\.env\.|import\.meta\.env' src 2>/dev/null | grep -Ev 'process\.env\.NEXT_PUBLIC_'; then
            echo "Found a server-only env reference in src/. Move it to app/api or add NEXT_PUBLIC_ prefix if truly public."
            exit 1
          fi
