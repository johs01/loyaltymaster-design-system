<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.palette { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; width: 100%; }
.sw { aspect-ratio: 1.4; border-radius: 12px; border: 1px solid rgba(151,144,147,0.22); position: relative; display:flex; align-items:flex-end; padding: 8px; }
.sw .n { font-size: 11px; font-weight: 700; letter-spacing: -0.1px; }
.sw .h { font-family: ui-monospace, Menlo, monospace; font-size: 9px; position:absolute; top: 8px; left: 8px; opacity: .7; }
</style></head><body>
<div class="palette">
  <div class="sw" style="background:#fcb827;color:#2a1f16"><span class="h">#FCB827</span><span class="n">Yellow</span></div>
  <div class="sw" style="background:#f37d39;color:#fff"><span class="h">#F37D39</span><span class="n">Orange</span></div>
  <div class="sw" style="background:#4c93af;color:#fff"><span class="h">#4C93AF</span><span class="n">Blue</span></div>
  <div class="sw" style="background:#302127;color:#fff"><span class="h">#302127</span><span class="n">Ink</span></div>
  <div class="sw" style="background:#fdd564;color:#2a1f16"><span class="h">#FDD564</span><span class="n">Yellow soft</span></div>
</div>
</body></html>
