<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.palette { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; }
.sw { aspect-ratio: 1.4; border-radius: 12px; position: relative; display:flex; align-items:flex-end; padding: 8px; border: 1px solid rgba(151,144,147,0.22);}
.sw .n { font-size: 11px; font-weight: 700; letter-spacing: -0.1px; }
.sw .h { font-family: ui-monospace, Menlo, monospace; font-size: 9px; position:absolute; top: 8px; left: 8px; opacity:.7; }
</style></head><body>
<div class="palette">
  <div class="sw" style="background:#302127;color:#f5edf1"><span class="h">#302127</span><span class="n">Ink</span></div>
  <div class="sw" style="background:#979093;color:#fff"><span class="h">#979093</span><span class="n">Muted</span></div>
  <div class="sw" style="background:#bfb8bc;color:#302127"><span class="h">#BFB8BC</span><span class="n">Subtle</span></div>
  <div class="sw" style="background:#fff3c4;color:#302127"><span class="h">#FFF3C4</span><span class="n">Tag</span></div>
</div>
</body></html>
