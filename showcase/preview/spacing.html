<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
body { padding: 16px 22px; gap: 10px; }
.bar { display:flex; gap: 4px; align-items:flex-end; flex: 1; }
.tick { background: var(--wr-accent-orange); opacity:.9; border-radius: 3px 3px 0 0; }
.lbl { font-size:9px; font-family: ui-monospace, Menlo, monospace; color: var(--wr-text-muted); text-align:center; width: 100%; margin-top: 4px; }
.col { display:flex; flex-direction:column; align-items:center; }
</style></head><body>
<div style="width:100%">
<div class="bar">
  <div class="col"><div class="tick" style="width:10px;height:4px"></div><span class="lbl">4</span></div>
  <div class="col"><div class="tick" style="width:10px;height:8px"></div><span class="lbl">8</span></div>
  <div class="col"><div class="tick" style="width:10px;height:12px"></div><span class="lbl">12</span></div>
  <div class="col"><div class="tick" style="width:10px;height:16px"></div><span class="lbl">16</span></div>
  <div class="col"><div class="tick" style="width:10px;height:20px"></div><span class="lbl">20</span></div>
  <div class="col"><div class="tick" style="width:10px;height:24px"></div><span class="lbl">24</span></div>
  <div class="col"><div class="tick" style="width:10px;height:32px"></div><span class="lbl">32</span></div>
  <div class="col"><div class="tick" style="width:10px;height:40px"></div><span class="lbl">40</span></div>
  <div class="col"><div class="tick" style="width:10px;height:48px"></div><span class="lbl">48</span></div>
  <div class="col"><div class="tick" style="width:10px;height:56px"></div><span class="lbl">56</span></div>
  <div class="col"><div class="tick" style="width:10px;height:64px"></div><span class="lbl">64</span></div>
  <div class="col"><div class="tick" style="width:10px;height:84px"></div><span class="lbl">84</span></div>
  <div class="col"><div class="tick" style="width:10px;height:96px"></div><span class="lbl">96</span></div>
</div>
<p style="font-family: ui-monospace, Menlo, monospace; font-size:10px; color:var(--wr-text-muted); margin:8px 0 0">section padding: 56 / 72 / 84px &nbsp;·&nbsp; gap: 18px</p>
</div>
</body></html>
