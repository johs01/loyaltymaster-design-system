<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
body { padding: 20px 24px; gap: 10px; }
.shell { display:flex; align-items:center; gap: 8px; padding: 6px; background: rgba(255,255,255,0.72); border: 1px solid rgba(252,184,39,0.62); border-radius: 999px; box-shadow: 0 4px 0 rgba(252,184,39,0.35), inset 0 0 0 2px rgba(252,184,39,0.45); flex: 1; }
.inp { flex: 1; border: none; outline: none; background: var(--wr-bg-panel-gray); padding: 14px 18px; border-radius: 999px; font-family: var(--wr-font-body); font-size: 17px; color: var(--wr-ink); }
.inp::placeholder { color: var(--wr-text-subtle); }
.go { background: #fcb827; color: #2a1f16; border: none; padding: 14px 22px; border-radius: 999px; font-family: var(--wr-font-body); font-weight: 700; font-size: 16px; cursor:pointer; }
</style></head><body>
<div class="shell">
  <input class="inp" placeholder="name@email.com" value="">
  <button class="go">Start Free in 2 Minutes</button>
</div>
</body></html>
