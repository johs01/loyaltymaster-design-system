<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
body { background: var(--wr-bg-peach); padding: 32px 36px; flex-direction: column; gap: 20px; align-items: flex-start; }
.email-cta-wrap { position: relative; width: 100%; max-width: 583px; }
.email-cta-glow {
  position: absolute; pointer-events: none;
  bottom: -40px; left: 50%; width: 100%; height: 150%;
  transform: translateX(-50%); border-radius: 50%; opacity: 0.7;
  filter: blur(28px);
  background-image: radial-gradient(80% 60% at 50% 80%, rgba(252,184,39,0.18), rgba(243,125,57,0.06) 60%, transparent 100%);
}
.email-cta {
  position: relative; z-index: 1;
  display: flex; align-items: center; gap: 8px;
  padding: 6px; border-radius: 999px;
  border: 2px solid rgba(252,184,39,0.6);
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(6px);
  box-shadow: 0 6px 12px rgba(48,33,39,0.08);
  transition: border-color 300ms, box-shadow 300ms;
  width: 100%;
}
.email-cta:hover {
  border-color: var(--wr-accent-yellow);
  box-shadow: 0 8px 20px rgba(48,33,39,0.12);
}
.email-cta input {
  min-height: 62px; flex: 1;
  border-radius: 999px; border: none;
  background: var(--wr-bg-panel-gray);
  padding: 0 24px;
  font-family: var(--wr-font-body);
  font-size: 20px; font-weight: 500;
  letter-spacing: -0.018em;
  color: var(--wr-ink);
  outline: none;
}
.email-cta input::placeholder { color: rgba(48,33,39,0.38); }
.email-cta input:focus { outline: 2px solid rgba(243,125,57,0.92); outline-offset: 2px; }
.email-cta button {
  position: relative; isolation: isolate;
  display: inline-flex; align-items: center; justify-content: center;
  min-height: 62px; flex-shrink: 0;
  padding: 0 32px; border-radius: 999px;
  border: 1px solid rgba(243,125,57,0.3);
  background: var(--wr-accent-yellow);
  color: #2a1f16;
  font-family: var(--wr-font-body); font-size: 20px; font-weight: 700;
  letter-spacing: -0.018em; cursor: pointer; overflow: hidden; white-space: nowrap;
  box-shadow: 0 5px 0 0 var(--wr-accent-orange), 0 8px 14px rgba(48,33,39,0.1);
  transition: transform 200ms, box-shadow 200ms;
}
.email-cta button::before {
  content: "";
  position: absolute; inset: 0; z-index: 0;
  border-radius: 999px; opacity: 0.6; pointer-events: none;
  background-image: linear-gradient(112deg, rgba(255,255,255,0) 14%, rgba(255,255,255,0.34) 44%, rgba(255,255,255,0) 68%);
}
.email-cta button span { position: relative; z-index: 1; }
.email-cta button:hover { transform: translateY(-1.5px); box-shadow: 0 6px 0 0 var(--wr-accent-orange), 0 12px 18px rgba(48,33,39,0.15); }
.email-cta button:active { transform: translateY(1px); box-shadow: 0 1px 0 0 var(--wr-accent-orange), 0 2px 4px rgba(48,33,39,0.1); }
.meta { font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: var(--wr-text-muted); }
</style></head>
<body>
  <div class="email-cta-wrap">
    <div class="email-cta-glow"></div>
    <div class="email-cta">
      <input type="email" placeholder="name@email.com" aria-label="Email address" />
      <button type="submit"><span>Start Free in 2 Minutes</span></button>
    </div>
  </div>
  <span class="meta">Email CTA · pill 74px · border #FCB827/60 · btn: yellow + 5px orange edge</span>
</body></html>
