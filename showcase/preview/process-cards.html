<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
body { padding: 14px 18px; gap: 10px; align-items:stretch; }
.card { flex:1; border-radius: 20px; border: 1px solid rgba(151,144,147,0.22); padding: 14px; display:flex; flex-direction:column; gap:8px; box-shadow: 0 8px 20px rgba(48,33,39,0.06); }
.peach { background:#fef0e9; border-color: rgba(243,125,57,0.22); }
.cyan  { background:#eaf5f8; border-color: rgba(76,147,175,0.22); }
.yellow{ background:#fef9e6; border-color: rgba(252,184,39,0.28); }
.pill { display:inline-flex; align-items:center; gap:8px; }
.badge { width: 26px; height: 26px; border-radius: 99px; color:#fff; display:grid; place-items:center; font-family: var(--wr-font-body); font-weight:700; font-size: 13px; }
.o{background:#f37d39}.b{background:#4c93af}.y{background:#fcb827;color:#2a1f16}
.t { font-family: var(--wr-font-body); font-weight:700; font-size:14px; color:var(--wr-ink); }
.p { font-size:11px; color:var(--wr-text-muted); line-height:1.5; margin:0; }
</style></head><body>
<article class="card peach"><div class="pill"><span class="badge o">1</span><span class="t">Invite</span></div><p class="p">Import existing customers or add as you go.</p></article>
<article class="card cyan"><div class="pill"><span class="badge b">2</span><span class="t">Segment</span></div><p class="p">Group by recency, spend, visit habits.</p></article>
<article class="card yellow"><div class="pill"><span class="badge y">3</span><span class="t">Send</span></div><p class="p">Launch a campaign in minutes.</p></article>
</body></html>
