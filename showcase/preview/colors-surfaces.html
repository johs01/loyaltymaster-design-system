<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.palette { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; width: 100%; }
.sw { aspect-ratio: 1.4; border-radius: 12px; border: 1px solid rgba(151,144,147,0.22); position: relative; display:flex; align-items:flex-end; padding: 8px; }
.sw .n { font-size: 11px; font-weight: 700; letter-spacing: -0.1px; color: #302127; }
.sw .h { font-family: ui-monospace, Menlo, monospace; font-size: 9px; position:absolute; top: 8px; left: 8px; color: #979093; }
</style></head><body>
<div class="palette">
  <div class="sw" style="background:#fef0e9"><span class="h">#FEF0E9</span><span class="n">Peach</span></div>
  <div class="sw" style="background:#eaf5f8"><span class="h">#EAF5F8</span><span class="n">Cyan</span></div>
  <div class="sw" style="background:#fde9e2"><span class="h">#FDE9E2</span><span class="n">Salmon</span></div>
  <div class="sw" style="background:#fef9e6"><span class="h">#FEF9E6</span><span class="n">Bg-Yellow</span></div>
  <div class="sw" style="background:#faf8f9"><span class="h">#FAF8F9</span><span class="n">Panel</span></div>
</div>
</body></html>
