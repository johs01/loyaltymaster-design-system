<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
body { flex-direction: column; align-items: flex-start; gap: 2px; padding: 14px 22px; }
.stack { display:flex; flex-direction:column; gap:4px; width:100%; }
.row { display:flex; gap:14px; align-items:baseline; }
.wt { font-family: "Rodger", Arial, sans-serif; font-size: 22px; color: var(--wr-ink); letter-spacing:-0.2px; }
.lbl { font-family: ui-monospace, Menlo, monospace; font-size:10px; color:var(--wr-text-muted); width: 108px; }
</style></head><body>
<div class="stack">
  <div class="row"><span class="lbl">100 · Thin</span><span class="wt" style="font-weight:100">Customer messaging</span></div>
  <div class="row"><span class="lbl">200 · ExtraLight</span><span class="wt" style="font-weight:200">Customer messaging</span></div>
  <div class="row"><span class="lbl">300 · Light</span><span class="wt" style="font-weight:300">Customer messaging</span></div>
  <div class="row"><span class="lbl">400 · Regular</span><span class="wt" style="font-weight:400">Customer messaging</span></div>
  <div class="row"><span class="lbl">500 · Medium</span><span class="wt" style="font-weight:500">Customer messaging</span></div>
  <div class="row"><span class="lbl">600 · Semibold</span><span class="wt" style="font-weight:600">Customer messaging</span></div>
  <div class="row"><span class="lbl">700 · Bold</span><span class="wt" style="font-weight:700">Customer messaging</span></div>
  <div class="row"><span class="lbl">800 · ExtraBold</span><span class="wt" style="font-weight:800">Customer messaging</span></div>
  <div class="row"><span class="lbl">900 · Black</span><span class="wt" style="font-weight:900">Customer messaging</span></div>
</div>
</body></html>
