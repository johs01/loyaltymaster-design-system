<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
body { padding: 16px 22px; gap: 10px; align-items:stretch; }
.card { flex:1; background: var(--wr-white); border: 1px solid rgba(151,144,147,0.22); border-radius: 16px; padding: 14px; display:flex; flex-direction:column; gap:8px; box-shadow: 0 8px 20px rgba(48,33,39,0.06); }
.ic { width: 36px; height:36px; border-radius: 10px; }
.o { background: linear-gradient(135deg, #f37d39, #fdb27a); }
.b { background: linear-gradient(135deg, #4c93af, #8bc2d6); }
.y { background: linear-gradient(135deg, #fcb827, #fdd564); }
.t { font-family: var(--wr-font-body); font-weight:700; font-size:15px; color:var(--wr-ink); }
.p { font-size:11px; color:var(--wr-text-muted); line-height:1.5; margin:0; }
</style></head><body>
<article class="card"><span class="ic o"></span><span class="t">Smart Segments</span><p class="p">Group customers by recency, spend, visit habits.</p></article>
<article class="card"><span class="ic b"></span><span class="t">Behavior Triggers</span><p class="p">Launch flows from real-time customer actions.</p></article>
<article class="card"><span class="ic y"></span><span class="t">Campaign Calendar</span><p class="p">Plan seasonal offers and auto-activate.</p></article>
</body></html>
