<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
body { padding: 20px 24px; gap: 16px; }
.card { flex: 1; height: 86px; border-radius: 16px; background: var(--wr-white); border: 1px solid rgba(151,144,147,0.22); padding: 12px; display:flex; flex-direction:column; justify-content:flex-end; font-size: 11px; font-weight:600; color: var(--wr-ink); }
.b { box-shadow: 0 8px 20px rgba(48,33,39,0.06); }
.h { box-shadow: 0 14px 26px rgba(48,33,39,0.12); }
.badge { background: #fcb827; color:#2a1f16; box-shadow: 0 7px 0 0 rgba(48,33,39,0.82); }
.meta { font-family: ui-monospace, Menlo, monospace; font-size:9px; color: var(--wr-text-muted); font-weight:500; }
</style></head><body>
<div class="card b"><span>card-base</span><span class="meta">0 8 20 · 6% ink</span></div>
<div class="card h"><span>card-hover</span><span class="meta">0 14 26 · 12% ink</span></div>
<div class="card badge"><span>badge</span><span class="meta" style="color:rgba(42,31,22,.7)">0 7 0 · 82% ink</span></div>
</body></html>
