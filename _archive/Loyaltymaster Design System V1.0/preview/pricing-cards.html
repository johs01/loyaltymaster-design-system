<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
body { padding: 14px 18px; gap: 10px; align-items:stretch; }
.card { flex:1; background: var(--wr-bg-panel-light); border: 1px solid rgba(151,144,147,0.22); border-radius: 16px; padding: 12px 14px; display:flex; flex-direction:column; gap: 4px; position:relative; }
.pro { background: linear-gradient(180deg, rgba(252,184,39,0.2) 0%, #fff 44%, #faf8f9 100%); border-color: rgba(252,184,39,0.4); box-shadow: 0 12px 24px rgba(243,125,57,0.16); }
.name { font-family: var(--wr-font-body); font-weight:700; font-size: 14px; color:var(--wr-ink); }
.val { font-family: var(--wr-font-display); font-weight: 400; font-size: 30px; line-height: 30px; letter-spacing:-0.6px; color: var(--wr-ink); }
.per { font-size: 11px; color:var(--wr-text-muted); margin-left:4px; }
.li  { font-size: 10.5px; color: var(--wr-ink); display:flex; align-items:center; gap:6px; }
.dot { width:5px; height:5px; border-radius:99px; background:#4c93af; }
.tag { position:absolute; top:10px; right:10px; background:#fcb827; color:#2a1f16; padding: 3px 8px; border-radius: 99px; font-size: 9px; font-weight:700; }
.cta { margin-top:4px; background:#fcb827; color:#2a1f16; border:none; padding: 7px 12px; border-radius: 99px; font-family: var(--wr-font-body); font-size: 11px; font-weight:700; cursor:pointer; text-align:center; }
</style></head><body>
<article class="card">
  <div class="name">Starter</div>
  <div><span class="val">$9</span><span class="per">/mo</span></div>
  <div class="cta">Get Started</div>
  <div class="li"><span class="dot"></span>Up to 500 contacts</div>
</article>
<article class="card pro">
  <span class="tag">MOST POPULAR</span>
  <div class="name">Pro</div>
  <div><span class="val">$19</span><span class="per">/mo</span></div>
  <div class="cta">Get Started</div>
  <div class="li"><span class="dot"></span>Up to 5,000 contacts</div>
</article>
<article class="card">
  <div class="name">Scale</div>
  <div><span class="val">$49</span><span class="per">/mo</span></div>
  <div class="cta">Get Started</div>
  <div class="li"><span class="dot"></span>Unlimited contacts</div>
</article>
</body></html>
